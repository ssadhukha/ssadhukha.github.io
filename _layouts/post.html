---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}
    {% if page.lede %}
      <p class="post-lede">{{ page.lede }}</p>
    {% endif %}
    <div class="post-meta">
      {{ page.date | date: "%d %B %Y" }}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
